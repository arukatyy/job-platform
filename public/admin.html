<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Admin панелі</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>Admin панелі</h1>
        <div>
            <a href="index.html">Басты бет</a>
            <a href="login.html">Шығу</a>
        </div>
    </nav>

    <main>
        <h2>Жаңа жұмыс қосу</h2>
        <form id="jobForm">
            <label>Компания атауы:</label>
            <input type="text" id="company" required>

            <label>Жұмыс атауы:</label>
            <input type="text" id="title" required>

            <label>Қала:</label>
            <select id="city" required>
                <option value="Астана">Астана</option>
                <option value="Алматы">Алматы</option>
                <option value="Шымкент">Шымкент</option>
                <option value="Қарағанды">Қарағанды</option>
            </select>

            <label>Жалақы:</label>
            <input type="text" id="salary" placeholder="мысалы: 250 000–500 000 ₸" required>

            <label>Тәжірибе:</label>
            <select id="experience" required>
                <option value="0–1 жыл">0–1 жыл</option>
                <option value="1–3 жыл">1–3 жыл</option>
                <option value="3–5 жыл">3–5 жыл</option>
                <option value="5+ жыл">5+ жыл</option>
            </select>

            <label>Жұмыс түрі:</label>
            <select id="employment" required>
                <option value="Толық жұмыс күні">Толық жұмыс күні</option>
                <option value="Жартылай жұмыс">Жартылай жұмыс</option>
                <option value="Қашықтан">Қашықтан</option>
            </select>

            <label>Жұмыс кестесі:</label>
            <select id="schedule" required>
                <option value="5/2">5/2</option>
                <option value="2/2">2/2</option>
                <option value="Еркін кесте">Еркін кесте</option>
            </select>

            <label>Міндеттері:</label>
            <textarea id="responsibilities" rows="4" placeholder="Мысалы: клиенттермен жұмыс, есеп жүргізу..." required></textarea>

            <label>Талаптары:</label>
            <textarea id="requirements" rows="4" placeholder="Мысалы: жауапкершілік, тәжірибе..." required></textarea>

            <label>Байланыс телефон:</label>
            <input type="text" id="contactphone" placeholder="+7..." required>

            <label>Email:</label>
            <input type="email" id="contactemail" placeholder="example@mail.com" required>

            <input type="hidden" id="username" value="admin">

            <button type="submit">Жұмысты қосу</button>
        </form>
        <p id="message"></p>
    </main>

    <script src="admin.js"></script>
</body>
</html>
